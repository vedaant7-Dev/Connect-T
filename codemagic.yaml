workflows:
  connect_t_android:
    name: Connect T Android APK

    max_build_duration: 60

    environment:
      node: 20
      java: 17

    scripts:
      - name: Install dependencies
        script: |
          cd mobile
          npm install

      - name: Expo prebuild
        script: |
          cd mobile
          npx expo prebuild --platform android --clean

      - name: Build APK
        script: |
          cd mobile/android
          chmod +x gradlew
          ./gradlew assembleRelease

    artifacts:
      - mobile/android/app/build/outputs/**/*.apk
